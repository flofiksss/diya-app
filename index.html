<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Дія</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Дія">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash-screen">
    <div class="logo-placeholder">Дія</div>
    <div class="loader"></div>
  </div>

  <!-- Экран PIN -->
  <div id="pinScreen" class="fullscreen-center" style="display: none;">
    <h2>Введіть PIN</h2>
    <input type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" class="pin-input">
    <button id="submitPin" class="blue-btn">Увійти</button>
    <p id="newPinHint" style="display: none; color: #aaa; margin-top: 12px;">Вперше? Придумайте 4 цифри.</p>
    <p id="pinError" style="color: red; display: none;"></p>
  </div>

  <!-- Главный экран приложения -->
  <div id="app" class="app-container" style="display: none;">
    <!-- Шапка -->
    <header class="header">
      <h1 class="app-title">Дія</h1>
      <span class="settings-icon" id="openSettings">⚙️</span>
    </header>

    <!-- Приветствие и уведомления -->
    <section class="greeting">
      <h2 class="greeting-text" id="greetingName">Привіт, </h2>
      <div class="notification" id="notification" style="display: none;">
        <span class="notif-icon">🔔</span>
        <span class="notif-text" id="notifText">Вам надійшов запит на підписання договору</span>
        <span class="notif-arrow">›</span>
      </div>
    </section>

    <!-- Блок документов -->
    <section class="documents-section">
      <h3 class="section-title">Документи</h3>
      <div class="documents-scroll" id="documentsScroll">
        <!-- Динамически -->
      </div>
    </section>

    <!-- Сервисы -->
    <section class="services-section">
      <div class="service-card" id="qrScanner">
        <span class="service-icon">📷</span>
        <span class="service-text">Сканувати QR-код</span>
      </div>
      <div class="service-card" id="eVorog">
        <span class="service-icon">💬</span>
        <span class="service-text">Чат-бот єВорог</span>
      </div>
      <div class="service-card" id="unbreakablePoints">
        <span class="service-icon">📍</span>
        <span class="service-text">Мапа Пунктів Незламності</span>
      </div>
      <div class="service-card" id="warBonds">
        <span class="service-icon">📈</span>
        <span class="service-text">Військові облігації</span>
      </div>
      <div class="service-card" id="paidTaxes">
        <span class="service-icon">🧾</span>
        <span class="service-text">Сплачені податки</span>
      </div>
      <div class="service-card" id="reservePlus">
        <span class="service-icon">🎖️</span>
        <span class="service-text">Резерв+</span>
      </div>
    </section>
  </div>

  <!-- Модальні вікна (ВСІ приховані за замовчуванням) -->
  <!-- Детальний перегляд документа -->
  <div id="docViewModal" class="modal" style="display: none;">
    <div class="modal-content doc-view-content">
      <span class="close-btn" id="closeDocView">&times;</span>
      <h2 id="docViewTitle"></h2>
      <div id="docViewPhoto" style="text-align:center; margin:16px 0;"></div>
      <p id="docViewName"></p>
      <p id="docViewBirth"></p>
      <p id="docViewNumber"></p>
      <p id="docViewExtra" style="display:none;"></p>
      <div style="text-align:center; margin-top:20px;">
        <img id="docViewQR" src="" alt="QR" style="background:#fff; padding:10px; border-radius:10px; width:200px; height:200px;">
      </div>
    </div>
  </div>

  <!-- Резерв+ -->
  <div id="reserveModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close-btn" id="closeReserve">&times;</span>
      <h2>Резерв+</h2>
      <div class="form-group"><label>Прізвище Ім'я По-батькові</label><input type="text" id="reserveName"></div>
      <div class="form-group"><label>Дата народження</label><input type="date" id="reserveBirth"></div>
      <div class="form-group"><label>Військове звання</label><input type="text" id="reserveRank"></div>
      <div class="form-group"><label>Спеціальність</label><input type="text" id="reserveSpec"></div>
      <button id="saveReserveBtn" class="blue-btn">Зберегти</button>
      <button id="deleteReserveBtn" class="blue-btn" style="background:#2c2c2e; margin-top:10px;">Видалити дані</button>
    </div>
  </div>

  <!-- Налаштування -->
  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close-btn" id="closeSettings">&times;</span>
      <h2>Налаштування</h2>
      <button id="editDocsBtn" class="blue-btn">Редагувати документи</button>
      <button id="changePinBtn" class="blue-btn" style="background:#2c2c2e; margin-top:10px;">Змінити PIN</button>
      <button id="logoutBtn" class="blue-btn" style="background:#2c2c2e; margin-top:10px;">Вийти</button>
    </div>
  </div>

  <!-- Редактор документів -->
  <div id="editorModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close-btn" id="closeEditor">&times;</span>
      <h2>Редагування даних</h2>
      <div class="form-group"><label>Прізвище Ім'я По-батькові</label><input type="text" id="fullNameInput"></div>
      <div class="form-group"><label>Дата народження</label><input type="date" id="birthDateInput"></div>
      <div class="form-group"><label>Номер паспорта</label><input type="text" id="passportNumberInput"></div>
      <div class="form-group"><label>Номер ID-картки</label><input type="text" id="idNumberInput"></div>
      <div class="form-group"><label>РНОКПП (ІПН)</label><input type="text" id="taxNumberInput"></div>
      <div class="form-group"><label>Номер посвідчення водія</label><input type="text" id="driverNumberInput"></div>
      <div class="form-group"><label>Фото</label><input type="file" id="photoInput" accept="image/*"><div class="photo-preview" id="photoPreview"></div></div>
      <button id="saveDocsBtn" class="blue-btn">Зберегти</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
