<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Дія</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Дія">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="splash" class="splash-screen">
    <div class="logo-placeholder">Дія</div>
    <div class="loader"></div>
  </div>

  <div id="pinScreen" class="fullscreen-center" style="display: none;">
    <h2>Введіть PIN</h2>
    <input type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" class="pin-input">
    <button id="submitPin" class="blue-btn">Увійти</button>
    <p id="newPinHint" style="display: none; color: #aaa; margin-top: 12px;">Вперше? Придумайте 4 цифри.</p>
    <p id="pinError" style="color: red; display: none;"></p>
  </div>

  <div id="app" class="app-container" style="display: none;">
    <header class="header">
      <h1 class="app-title">Дія</h1>
      <span class="settings-icon" id="openSettings">⚙️</span>
    </header>
    <main class="documents-list" id="documentsList"></main>
  </div>

  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Налаштування</h2>
      <button id="editDocsBtn" class="blue-btn">Редагувати документи</button>
      <button id="changePinBtn" class="blue-btn" style="background:#2c2c2e; margin-top:10px;">Змінити PIN</button>
      <button id="logoutBtn" class="blue-btn" style="background:#2c2c2e; margin-top:10px;">Вийти</button>
    </div>
  </div>

  <div id="editorModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Редагування даних</h2>
      <div class="form-group"><label>Прізвище Ім'я По-батькові</label><input type="text" id="fullNameInput"></div>
      <div class="form-group"><label>Дата народження</label><input type="date" id="birthDateInput"></div>
      <div class="form-group"><label>Номер ID-картки</label><input type="text" id="idNumberInput"></div>
      <div class="form-group"><label>РНОКПП (ІПН)</label><input type="text" id="taxNumberInput"></div>
      <div class="form-group"><label>Номер посвідчення водія</label><input type="text" id="driverNumberInput"></div>
      <div class="form-group"><label>Фото (для ID-картки)</label><input type="file" id="photoInput" accept="image/*"><div class="photo-preview" id="photoPreview"></div></div>
      <button id="saveDocsBtn" class="blue-btn">Зберегти</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
